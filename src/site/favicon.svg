<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title>Simple coffee cup favicon</title>
  <desc>A minimal coffee cup icon with warm brown coffee and subtle steam.</desc>

  <defs>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b331f"/>
      <stop offset="1" stop-color="#2f1a10"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" fill="none"/>

  <!-- steam -->
  <path d="M24 18c-2-3 2-5 0-8" fill="none" stroke="#c98b52" stroke-width="3" stroke-linecap="round"/>
  <path d="M32 16c-2-3 2-5 0-8" fill="none" stroke="#c98b52" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 18c-2-3 2-5 0-8" fill="none" stroke="#c98b52" stroke-width="3" stroke-linecap="round"/>

  <!-- saucer -->
  <ellipse cx="30" cy="48" rx="20" ry="5" fill="#2f2a28" opacity="0.18"/>

  <!-- cup -->
  <rect x="16" y="22" width="30" height="20" rx="6" fill="#111111"/>
  <rect x="20" y="26" width="22" height="10" rx="5" fill="url(#coffee)"/>
  <path d="M46 26h4c5 0 8 3 8 8s-3 8-8 8h-4" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle rim -->
  <rect x="16" y="22" width="30" height="20" rx="6" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
</svg>
